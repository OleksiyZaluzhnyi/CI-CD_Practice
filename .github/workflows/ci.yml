# Назва нашого автоматичного процесу
name: Node.js CI

# Коли цей процес має запускатися?
# У нашому випадку - щоразу, коли ми завантажуємо код (push) у головну гілку (main)
on:
  push:
    branches: [ "main" ]

# З яких завдань (робіт) складається наш конвеєр?
jobs:
  build:
    # На якому "комп'ютері" (сервері) буде працювати наш робот-перевіряльник
    runs-on: ubuntu-latest

    # Кроки, які робот має виконати по черзі
    steps:
      # Крок 1: Завантажити наш код із репозиторію на сервер
      - name: Checkout repository
        uses: actions/checkout@v3

      # Крок 2: Встановити програму Node.js, щоб ми могли запустити наш код
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # Крок 3: Встановити всі необхідні бібліотеки для нашої програми
      - name: Install dependencies
        run: npm install

      # Крок 4: Запустити автоматичні тести (перевірити, чи все працює)
      - name: Run tests
        run: npm test